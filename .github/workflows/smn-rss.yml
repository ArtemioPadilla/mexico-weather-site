name: SMN RSS

# Scrapes the SMN (Servicio Meteorológico Nacional) site with Playwright and
# refreshes the committed feed at src/data/smn-feed.xml. The Astro endpoint
# src/pages/rss.xml.ts serves this file verbatim when it is fresh, otherwise
# it falls back to its build-time CA-based Open-Meteo derivation.

on:
  schedule:
    # Hourly, at minute 17 (offset from other crons to avoid contention).
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  # Needed to explicitly dispatch the CD workflow after a feed commit.
  # GitHub does NOT trigger workflows from pushes made with the default
  # GITHUB_TOKEN, so cd.yml (on: push) never runs after this scrape — we
  # have to kick it off ourselves via the Actions API.
  actions: write

concurrency:
  group: smn-rss
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh SMN RSS feed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/smn-rss/requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('scripts/smn-rss/requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r scripts/smn-rss/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape SMN and regenerate feed
        run: python scripts/smn-rss/smn_rss.py

      - name: Commit feed if changed
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          grep -q '<item>' src/data/smn-feed.xml || { echo "Feed has no items — skipping commit"; exit 0; }
          git diff --quiet -- src/data/smn-feed.xml || (
            git add src/data/smn-feed.xml
            git commit -m 'chore: refresh SMN RSS feed'
            git push
            echo 'committed=true' >> "$GITHUB_OUTPUT"
          )

      - name: Trigger CD deploy
        # The feed commit above is pushed with GITHUB_TOKEN, which does NOT
        # trigger cd.yml's `on: push`. Explicitly dispatch CD so the freshly
        # scraped feed actually goes live at /rss.xml. Only runs when a feed
        # commit+push actually happened (skipped when nothing changed or the
        # no-items guard exited early).
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run cd.yml
