name: MX Cities Dictionary

# Pre-computes a static dictionary of ~250 MX cities (state capitals,
# major metros, tourist destinations) by looking up each one's
# canonical name + coords + admin1 + population via Open-Meteo's
# keyless geocoding API. Output: public/data/mx-cities.json. The
# /pregunta NL router checks this dict before falling back to live
# geocoding — turns most queries into zero-network lookups.

on:
  schedule:
    # Once a month at 05:30 UTC on the 7th. Population data changes
    # slowly; weekly would be wasteful.
    - cron: '30 5 7 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: mx-cities
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh MX cities dictionary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build mx-cities.json from Open-Meteo geocoder
        run: python3 scripts/build-mx-cities.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # See marine-snapshot.yml — stage first so a never-tracked
          # file registers as a real diff.
          git add public/data/mx-cities.json
          git diff --staged --quiet || (
            git commit -m 'chore: refresh MX cities dictionary' &&
            git push &&
            echo 'committed=true' >> "$GITHUB_OUTPUT"
          )

      - name: Trigger CD deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run cd.yml
