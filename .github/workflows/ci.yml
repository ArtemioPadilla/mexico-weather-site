name: CI

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run check
      - run: npm run build
        env:
          # Complete the incomplete SMN TLS chain (see src/data/smn-ca.pem)
          # so the RSS endpoint fetches real avisos; TLS stays verified.
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/src/data/smn-ca.pem
