name: CD — Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_BUILD_SHA: ${{ github.sha }}
          PUBLIC_VERSION: ${{ github.ref_name }}
          # smn.conagua.gob.mx serves an incomplete TLS chain (missing the
          # GeoTrust TLS RSA CA G1 intermediate). Supply the genuine
          # intermediate so the build-time RSS fetch gets REAL SMN avisos with
          # TLS verification fully enabled (no rejectUnauthorized:false).
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/src/data/smn-ca.pem
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
