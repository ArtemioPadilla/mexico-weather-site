name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: input
    id: title
    attributes:
      label: Feature summary
      placeholder: What do you want to add or improve?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe how you'd like it to work
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Estimated complexity
      options:
        - Small (< 1 day)
        - Medium (1–3 days)
        - Large (> 3 days)
        - Unknown
