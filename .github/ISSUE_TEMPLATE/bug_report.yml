name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! Fill in as much detail as you can.
        **Tip:** Use the chat bubble (bottom-right) on the live site to auto-fill diagnostics.

  - type: input
    id: title
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics (optional)
      description: Paste the diagnostics copied from the FeedbackFAB if available
      placeholder: |
        Environment: ...
        Console errors: ...
        Failed requests: ...
      render: text
